# egov-security configuration for test (HSQLDB sampledb)
id=egovSecurityConfig
loginUrl=/uat/uia/egovLoginUsr.do
loginProcessUrl=/uat/uia/actionSecurityProcess.do
logoutUrl=/uat/uia/actionSecurityLogout.do
logoutSuccessUrl=/uat/uia/egovLoginUsr.do
loginFailureUrl=/uat/uia/egovLoginUsr.do?login_error=1
accessDeniedUrl=/sec/ram/accessDenied.do
dataSource=dataSource
jdbcUsersByUsernameQuery=SELECT USER_ID, USER_PASSWORD AS PASSWORD, ENABLED, USER_NAME, BIRTH_DAY, SSN FROM USERS WHERE USER_ID = ?
jdbcAuthoritiesByUsernameQuery=SELECT USER_ID, AUTHOR_CODE AS AUTHORITY FROM AUTHORITIES WHERE USER_ID = ?
jdbcMapClass=egovframework.com.security.userdetails.EgovUserDetailsMapping
requestMatcherType=regex
hash=plaintext
hashBase64=false
concurrentMaxSessons=1
concurrentExpiredUrl=/EgovContent.do
errorIfMaximumExceeded=false
defaultTargetUrl=/EgovContent.do
alwaysUseDefaultTargetUrl=true
sniff=true
xframeOptions=SAMEORIGIN
xssProtection=true
cacheControl=false
csrf=false
csrfAccessDeniedUrl=
permitAllList=/css/**,/js/**,/images/**,/resource/**,/public/**,/uat/uia/**,/index.do,/EgovContent.do,/sec/ram/accessDenied.do,/sale/**
sqlHierarchicalRoles=SELECT PARNTS_ROLE AS child, CHLDRN_ROLE AS parent FROM ROLESHIERARCHY
sqlRolesAndUrl=SELECT r.ROLE_PTTRN AS url, a.AUTHOR_CODE AS authority FROM ROLES r INNER JOIN AUTHROLES a ON r.ROLE_CODE = a.ROLE_CODE ORDER BY r.ROLE_SORT
sqlRegexMatchedRequestMapping=
