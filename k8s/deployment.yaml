apiVersion: apps/v1
kind: Deployment
metadata:
  name: egov-common-components
  labels:
    app.kubernetes.io/name: egov-common-components
    app.kubernetes.io/part-of: egovframe
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: egov-common-components
  template:
    metadata:
      labels:
        app.kubernetes.io/name: egov-common-components
        app.kubernetes.io/part-of: egovframe
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: app
          # Replace with your registry/tag, e.g. ghcr.io/<org>/egov-common-components:5.0.0
          image: egovframe-common-components:5.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2000m"
              memory: "2Gi"
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 60
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 120
            periodSeconds: 20
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tomcat-work
              mountPath: /usr/local/tomcat/work
            - name: tomcat-temp
              mountPath: /usr/local/tomcat/temp
            - name: tomcat-logs
              mountPath: /usr/local/tomcat/logs
      volumes:
        - name: tomcat-work
          emptyDir: {}
        - name: tomcat-temp
          emptyDir: {}
        - name: tomcat-logs
          emptyDir: {}
